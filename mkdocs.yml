site_name: goflow
site_description: AI workflow orchestration engine for multi-agent LLM pipelines
site_url: https://alxayo.github.io/goflow/
repo_name: goflow
repo_url: https://github.com/alxayo/goflow

theme:
  name: material
  language: en
  icon:
    logo: material/transit-connection-variant
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alxayo/goflow
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Your First Workflow: getting-started/first-workflow.md
  - Tutorial:
      - Overview: tutorial/index.md
      - Parameterizing Workflows: tutorial/inputs.md
      - Multi-Step Pipelines: tutorial/multi-step.md
      - Parallel Execution: tutorial/parallel.md
      - Conditional Steps: tutorial/conditions.md
      - Reusable Agent Files: tutorial/agent-files.md
  - Reference:
      - Workflow Schema: reference/workflow-schema.md
      - Settings And Options: reference/settings-and-options.md
      - Agent File Format: reference/agent-format.md
      - Agent Skills: reference/skills.md
      - Hooks: reference/hooks.md
      - Model Selection & BYOK: reference/model-selection.md
      - Step Timeout: reference/step-timeout.md
      - Session Monitoring: reference/timeout-clarification.md
      - CLI Commands: reference/cli.md
      - Template Variables: reference/templates.md
      - Shared Memory: reference/shared-memory.md
      - Output Control: reference/output.md
      - Advanced Usage: reference/advanced-usage.md
      - Architecture: reference/architecture.md
  - Examples:
      - Overview: examples/index.md
      - Simple Sequential: examples/simple-sequential.md
      - Code Review Pipeline: examples/code-review.md
      - Security Scan: examples/security-scan.md
      - Decision Helper: examples/decision-helper.md
      - Global News Trends: examples/global-news-trends.md
      - Guided Code Review: examples/guided-code-review.md
  - Comparison: COMPARISON_GITHUB_AGENTIC_WORKFLOWS.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
